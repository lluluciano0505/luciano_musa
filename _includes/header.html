<header>
  <div class="header-content">
    <a href="{{ '' | relative_url }}/" class="logo">
      {% if site.data.settings.logo %}
        <img src="{{ site.data.settings.logo | relative_url }}" alt="{{ site.title }}" style="height: 40px;">
      {% else %}
        {{ site.title }}
      {% endif %}
    </a>

    <button type="button" id="menubutton" aria-haspopup="true" aria-controls="menu-panel" class="menu-trigger">
      <span class="visually-hidden">Toggle Menu</span>
      <div class="menu-trigger-bars" aria-hidden="true">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </button>

    <nav id="menu-panel">
      <ul>
        {% for item in site.data.settings.menu %}
          <li><a href="{{ item.url | relative_url }}">{{ item.name }}</a></li>
        {% endfor %}
        {% if site.data.settings.resume %}
          <li><a href="{{ site.data.settings.resume | relative_url }}">{{ site.data.settings.resume_link_title }}</a></li>
        {% endif %}
      </ul>
    </nav>
  </div>
</header>
